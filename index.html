<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Memorization PWA</title>
    <!-- Web App Manifest untuk PWA -->
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlF1cmFuIE1lbW9yaXphdGlvbiBUaW1lciIsCiAgInNob3J0X25hbWUiOiAiUXVyYW4gVGltZXIiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI2YwZjRmOCIsCiAgInRoZW1lX2NvbG9yIjogIiM0QUYwQTAiCn0=">
    
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #2ECC71;
            --dark: #2C3E50;
            --light: #F8F9FA;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header & Hamburger Menu */
        header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--dark);
        }

        .app-title {
            margin-left: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        /* Sidebar / Settings */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 250px;
            height: 100%;
            background: white;
            box-shadow: 3px 0 10px rgba(0,0,0,0.2);
            z-index: 100;
            transition: 0.3s;
            padding: 15px;
        }

        .sidebar.active {
            left: 0;
        }

        .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        /* Scrollable Rows */
        .scroll-container {
            padding: 10px 15px;
        }

        .section-title {
            font-size: 16px;
            margin-bottom: 5px;
            padding-left: 5px;
            font-weight: 600;
        }

        .horizontal-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 10px 5px;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }

        .horizontal-scroll::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome/Safari */
        }

        /* Card Styles */
        .timer-card {
            flex: 0 0 calc(50% - 10px); /* Muat tepat 2 item di layar */
            scroll-snap-align: start;
            background: linear-gradient(135deg, var(--primary), #357ABD);
            color: white;
            border-radius: 15px;
            padding: 30px 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .break-card {
            flex: 0 0 calc(40% - 10px); /* Lebih kecil dari timer utama */
            scroll-snap-align: start;
            background: linear-gradient(135deg, var(--secondary), #27AE60);
            color: white;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .timer-card:active, .break-card:active {
            transform: scale(0.95);
        }

        /* Active Timer Display */
        .countdown-display {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            color: #E74C3C;
            min-height: 58px;
        }

        /* Bottom Section */
        .bottom-section {
            margin-top: auto;
            padding: 20px;
            text-align: center;
        }

        .surah-display {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 35px;
            color: #8E44AD;
        }

        .random-btn {
            background: #8E44AD;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(142, 68, 173, 0.3);
            width: 80%;
            max-width: 300px;
        }

        /* Overlay Background when sidebar opened */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }
        .overlay.active { display: block; }

        /* Settings item list */
        .surah-manager {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }
        .surah-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <button class="menu-btn" onclick="toggleMenu(true)">☰</button>
        <div class="app-title">Hafalan Quran Anak</div>
    </header>

    <!-- Sidebar / Settings -->
    <div class="overlay" id="overlay" onclick="toggleMenu(false)"></div>
    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleMenu(false)">✕</button>
        <h3>Pengaturan Surat</h3>
        
        <input type="text" id="newSurah" placeholder="Nama Surat Baru..." style="width:70%; padding:5px;">
        <button onclick="addSurah()" style="padding:5px;">Tambah</button>

        <div class="surah-manager" id="surahManagerList">
            <!-- Dinamis via JS -->
        </div>

        <hr style="margin-top:20px;">
        <h4>Backup Data</h4>
        <button onclick="exportSurah()" style="width:100%; padding:8px; margin-bottom:5px;">Export Daftar Surat</button>
        <input type="file" id="importFile" onchange="importSurah(event)" style="display:none;">
        <button onclick="document.getElementById('importFile').click()" style="width:100%; padding:8px;">Import Daftar Surat</button>
    </div>

    <!-- Live Countdown Display -->
    <div class="countdown-display" id="countdown">00:00</div>

    <!-- Baris 1: Timer Utama -->
    <div class="scroll-container">
        <div class="section-title">⏱️ Waktu Menghafal</div>
        <div class="horizontal-scroll">
            <div class="timer-card" onclick="startTimer(40)">40 Mnt</div>
            <div class="timer-card" onclick="startTimer(30)">30 Mnt</div>
            <div class="timer-card" onclick="startTimer(20)">20 Mnt</div>
            <div class="timer-card" onclick="startTimer(15)">15 Mnt</div>
            <div class="timer-card" onclick="startTimer(10)">10 Mnt</div>
        </div>
    </div>

    <!-- Baris 2: Timer Istirahat -->
    <div class="scroll-container">
        <div class="section-title">☕ Waktu Istirahat</div>
        <div class="horizontal-scroll">
            <div class="break-card" onclick="startTimer(15)">15 Mnt</div>
            <div class="break-card" onclick="startTimer(10)">10 Mnt</div>
            <div class="break-card" onclick="startTimer(5)">5 Mnt</div>
        </div>
    </div>

    <!-- Baris Bawah: Randomizer -->
    <div class="bottom-section">
        <div class="surah-display" id="surahResult">Klik Acak Surat!</div>
        <button class="random-btn" onclick="randomizeSurah()">Acak Surat 🎲</button>
    </div>

    <!-- Audio Element untuk alarm (Menggunakan buzzer sintetis standar jika file audio tidak ada) -->
    <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script>
        // Data Default Surat Pendek
        let defaultSurahs = ["An-Nas", "Al-Falaq", "Al-Ikhlas", "Al-Lahab", "An-Nasr", "Al-Kafirun", "Al-Kautsar", "Al-Ma'un", "Quraisy"];
        let surahList = JSON.parse(localStorage.getItem('surahList')) || defaultSurahs;

        let countdownInterval;
        const alarm = document.getElementById('alarmSound');

        function toggleMenu(open) {
            document.getElementById('sidebar').classList.toggle('active', open);
            document.getElementById('overlay').classList.toggle('active', open);
            if(open) renderSurahSettings();
        }

        // Fungsi Timer
        function startTimer(minutes) {
            clearInterval(countdownInterval);
            alarm.pause();
            alarm.currentTime = 0;
            
            let time = minutes * 60;
            const display = document.getElementById('countdown');

            countdownInterval = setInterval(() => {
                let mins = Math.floor(time / 60);
                let secs = time % 60;

                mins = mins < 10 ? '0' + mins : mins;
                secs = secs < 10 ? '0' + secs : secs;

                display.textContent = `${mins}:${secs}`;

                if (time <= 0) {
                    clearInterval(countdownInterval);
                    alarm.play().catch(() => alert("Waktu habis! (Aktifkan suara browser)"));
                }
                time--;
            }, 1000);
        }

        // Fungsi Randomizer
        function randomizeSurah() {
            if(surahList.length === 0) {
                document.getElementById('surahResult').textContent = "Daftar surat kosong!";
                return;
            }
            const randomIndex = Math.floor(Math.random() * surahList.length);
            document.getElementById('surahResult').textContent = "Surat: " + surahList[randomIndex];
        }

        // Manajemen Surat di Settings
        function renderSurahSettings() {
            const listContainer = document.getElementById('surahManagerList');
            listContainer.innerHTML = '';
            surahList.forEach((surah, index) => {
                listContainer.innerHTML += `
                    <div class="surah-item">
                        <span>${surah}</span>
                        <button onclick="deleteSurah(${index})" style="color:red; border:none; background:none; cursor:pointer;">Hapus</button>
                    </div>
                `;
            });
        }

        function addSurah() {
            const input = document.getElementById('newSurah');
            if(input.value.trim() !== "") {
                surahList.push(input.value.trim());
                saveData();
                input.value = "";
                renderSurahSettings();
            }
        }

        function deleteSurah(index) {
            surahList.splice(index, 1);
            saveData();
            renderSurahSettings();
        }

        function saveData() {
            localStorage.setItem('surahList', JSON.stringify(surahList));
        }

        // Export JSON
        function exportSurah() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(surahList));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "daftar_surat_hafalan.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // Import JSON
        function importSurah(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if(Array.isArray(importedData)) {
                        surahList = importedData;
                        saveData();
                        renderSurahSettings();
                        alert("Daftar surat berhasil di-import!");
                    } else {
                        alert("Format file salah.");
                    }
                } catch (err) {
                    alert("Gagal membaca file.");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
